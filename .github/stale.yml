# Configuration for probot-stale - https://github.com/probot/stale

# Number of days of inactivity before an Issue or Pull Request becomes stale
daysUntilStale: 30

# Number of days of inactivity before a stale Issue or Pull Request is closed
daysUntilClose: 7

# Issues or Pull Requests with these labels will never be considered stale
exemptLabels:
  - "confirmed-bug"
  - "security"
  - "pinned"

# Label to apply when marking something as stale
staleLabel: stale

# Comment to post when marking an Issue as stale
markComment: >
  This issue has been automatically marked as stale because it has not had
  recent activity. It will be closed if no further activity occurs. Thank you
  for your contributions.

# Comment to post when closing a stale Issue
closeComment: >
  This issue has been automatically closed due to inactivity. If you are still
  experiencing this problem, please reopen it with an updated reproducible example.
